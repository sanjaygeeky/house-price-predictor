name: MLOps CI

on:
  push: 
    branches: 
      - main
  pull_request: 
    branches: 
    - main

jobs:
  build:
    runs-on: ubuntu:latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt